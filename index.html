<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POLICE_OS | CLOUD SURVEILLANCE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Cairo:wght@400;700&display=swap');
        
        :root { 
            --police-blue: #0055ff; 
            --police-red: #ff0033; 
            --bg-dark: #020205; 
            --tactical-gray: rgba(255, 255, 255, 0.1);
        }

        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg-dark); color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; user-select: none; }
        
        /* تأثير مسح الرادار الخلفي */
        .glass-bg { 
            position: fixed; inset: 0; z-index: -2; 
            background: radial-gradient(circle at center, #0a1a35 0%, #020205 100%);
        }
        .glass-bg::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: rgba(0, 85, 255, 0.2); animation: scan 4s linear infinite;
        }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        .scroll-engine { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .scroll-engine::-webkit-scrollbar { display: none; }
        .v-seg { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; overflow: hidden; border-bottom: 1px solid var(--tactical-gray); }
        video { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.8) contrast(1.1); }
        
        /* تصميم الواجهة التكتيكية */
        .tactical-ui { 
            background: rgba(0, 10, 30, 0.7); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(0, 85, 255, 0.3); 
            border-radius: 4px; /* زوايا حادة لتبدو أكثر عسكرية */
        }
        
        .cam-frame {
            position: absolute; inset: 20px; border: 1px solid rgba(255,255,255,0.1);
            pointer-events: none; z-index: 10;
        }
        .cam-frame::before { content: "REC"; position: absolute; top: 10px; left: 10px; color: var(--police-red); font-family: 'Share Tech Mono'; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        .action-sidebar { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 20px; z-index: 100; }
        .action-btn { 
            width: 55px; height: 55px; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            transition: 0.2s; cursor: pointer; border: 1px solid var(--tactical-gray);
        }
        .action-btn:active { background: var(--police-blue); }

        .v-details { position: absolute; bottom: 130px; left: 20px; right: 80px; z-index: 100; }
        .status-tag { display: inline-block; background: var(--police-blue); color: white; padding: 2px 8px; font-size: 10px; font-family: 'Share Tech Mono'; margin-bottom: 5px; }
        .v-title { font-family: 'Share Tech Mono'; color: #fff; font-size: 18px; font-weight: bold; letter-spacing: 1px; }

        #up-trigger { 
            width: 60px; height: 60px; background: var(--police-blue); color: #fff; 
            display: flex; align-items: center; justify-content: center; font-size: 24px; 
            clip-path: polygon(20% 0%, 80% 0%, 100% 20%, 100% 80%, 80% 100%, 20% 100%, 0% 80%, 0% 20%);
            cursor: pointer; box-shadow: 0 0 20px rgba(0, 85, 255, 0.5);
        }

        nav { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 450px; height: 80px; display: flex; justify-content: space-around; align-items: center; z-index: 200; background: rgba(0,0,0,0.8); border: 1px solid var(--police-blue); }
        
        #admin-panel, #chat-ov { 
            position: fixed; inset: 0; z-index: 1000; background: rgba(2, 2, 5, 0.98); 
            display: none; flex-direction: column; padding: 30px 20px; border: 4px solid var(--police-blue);
        }
    </style>
</head>
<body>
    <div class="glass-bg"></div>
    
    <header class="fixed top-5 left-5 right-5 z-[500] flex justify-between items-center pointer-events-none">
        <div class="tactical-ui px-4 py-1 pointer-events-auto border-l-4 border-l-[#ff0033]">
            <span class="font-['Share_Tech_Mono'] text-[16px] text-white">POLICE_UNIT: <span class="text-[#ff0033]">ACTIVE</span></span>
        </div>
        <div class="tactical-ui p-2 px-4 font-['Share_Tech_Mono'] text-[14px] text-blue-400" id="clock">00:00:00</div>
    </header>

    <main class="scroll-engine" id="video-stack"></main>

    <nav>
        <div class="cursor-pointer text-white/50 hover:text-white" onclick="checkAdmin()"><i class="fas fa-shield-halved text-2xl"></i></div>
        <div id="up-trigger"><i class="fas fa-upload"></i></div>
        <div class="cursor-pointer text-white/50 hover:text-white" onclick="openAd(); toggleChat()"><i class="fas fa-tower-broadcast text-2xl"></i></div>
    </nav>

    <div id="admin-panel">
        <div class="flex justify-between items-center mb-6 border-b border-blue-900 pb-4">
            <h2 class="font-['Share_Tech_Mono'] text-blue-500 text-xl font-bold">SYSTEM_OVERRIDE</h2>
            <button onclick="toggleAdmin()" class="text-white"><i class="fas fa-xmark text-2xl"></i></button>
        </div>
        <div id="admin-list" class="flex-1 overflow-y-auto space-y-3"></div>
    </div>

    <div id="chat-ov">
        <div class="flex justify-between items-center mb-6 border-b border-blue-900 pb-4">
            <h2 class="font-['Share_Tech_Mono'] text-blue-400">ENCRYPTED_COMMS</h2>
            <i class="fas fa-xmark text-white/40 text-2xl cursor-pointer" onclick="toggleChat()"></i>
        </div>
        <div id="chat-box" class="flex-1 overflow-y-auto space-y-2 font-mono text-sm"></div>
        <div class="mt-4 flex gap-2 p-2 bg-black border border-blue-900">
            <input type="text" id="msg-input" class="bg-transparent flex-1 outline-none px-4 text-blue-400" placeholder="Type command...">
            <button onclick="sendMsg()" class="bg-blue-700 text-white px-6 py-2 font-bold hover:bg-blue-600">EXECUTE</button>
        </div>
    </div>

    <script>
        // -- نفس منطق البرمجة الخاص بك مع تعديلات بسيطة لتناسب المظهر --
        const MASTER_KEY = "1234";
        const AD_LINKS = [
            "https://www.effectivegatecpm.com/q7bf96ad4p?key=4272e67963ce67f1cfaeb4a56682d6ec",
            "https://www.effectivegatecpm.com/w6ejwgptb?key=b77b52a8f4f7e4cdd1ac7bccc1b04a4d"
        ];
        let currentAd = 0;

        firebase.initializeApp({ databaseURL: "https://xkom-a73e4-default-rtdb.firebaseio.com/" });
        const db = firebase.database();

        function openAd() { window.open(AD_LINKS[currentAd], '_blank'); currentAd = (currentAd + 1) % 2; }
        function updateClock() { document.getElementById('clock').innerText = "SYS_TIME: " + new Date().toLocaleTimeString('en-GB'); }
        setInterval(updateClock, 1000);

        function toggleMute(btn, videoId) {
            const v = document.getElementById('vid-' + videoId);
            v.muted = !v.muted;
            btn.innerHTML = v.muted ? '<i class="fas fa-volume-xmark"></i>' : '<i class="fas fa-volume-high"></i>';
        }

        db.ref('vox_god_content').on('value', (snap) => {
            const container = document.getElementById('video-stack');
            const adminList = document.getElementById('admin-list');
            const data = snap.val();
            container.innerHTML = ''; adminList.innerHTML = '';
            if(!data) return;
            Object.keys(data).reverse().forEach((id) => {
                const vid = data[id];
                const section = document.createElement('section');
                section.className = 'v-seg';
                section.innerHTML = `
                    <div class="cam-frame"></div>
                    <video id="vid-${id}" loop playsinline src="${vid.url}" onclick="this.paused?this.play():this.pause()"></video>
                    
                    <div class="v-details">
                        <span class="status-tag">INTEL_FEED_${id.substring(1,5)}</span>
                        <div class="v-title">DATA_STREAM_ON_AIR</div>
                    </div>

                    <div class="action-sidebar">
                        <div class="action-btn tactical-ui text-white" onclick="toggleMute(this, '${id}')">
                            <i class="fas fa-volume-high"></i>
                        </div>
                        <div class="action-btn tactical-ui text-blue-500" onclick="openAd(); db.ref('vox_god_content/${id}/likes').transaction(l=>(l||0)+1)">
                            <i class="fas fa-shield-heart"></i>
                            <span class="text-[10px] text-white mt-1">${vid.likes || 0}</span>
                        </div>
                        <div class="action-btn tactical-ui text-white" onclick="openAd(); toggleChat()">
                            <i class="fas fa-message"></i>
                        </div>
                        <div class="action-btn tactical-ui text-white" onclick="openAd(); navigator.share({url:window.location.href})">
                            <i class="fas fa-satellite-dish"></i>
                        </div>
                    </div>
                `;
                container.appendChild(section);
                adminList.innerHTML += `<div class="flex items-center gap-4 bg-blue-900/20 p-2 border border-blue-900"><video class="w-12 h-12 object-cover" src="${vid.url}"></video><div class="flex-1 font-mono text-[10px] text-blue-300">ID: ${id}</div><button onclick="deleteVideo('${id}')" class="text-red-500 px-3"><i class="fas fa-trash"></i></button></div>`;
            });
            initObserver();
        });

        function deleteVideo(id) { if(confirm("إتلاف البيانات؟")) db.ref('vox_god_content/' + id).remove(); }

        const myWidget = cloudinary.createUploadWidget({ 
            cloudName: "dqzjfaqg4", 
            uploadPreset: "vox_god", 
            styles: { palette: { window: "#020205", windowBorder: "#0055ff", tabIcon: "#0055ff", action: "#ff0033", textLight: "#ffffff" } }
        }, (err, res) => {
            if (!err && res.event === "success") {
                db.ref('vox_god_content/').push({ url: res.info.secure_url, likes: 0, timestamp: Date.now() });
            }
        });
        document.getElementById("up-trigger").onclick = () => myWidget.open();

        function toggleChat() { const c = document.getElementById('chat-ov'); c.style.display = c.style.display==='flex'?'none':'flex'; }
        function checkAdmin() { if(prompt("ACCESS CODE REQUIRED:") === MASTER_KEY) toggleAdmin(); }
        function toggleAdmin() { const a = document.getElementById('admin-panel'); a.style.display = a.style.display==='flex'?'none':'flex'; }
        
        function sendMsg() { 
            const inp = document.getElementById('msg-input'); 
            if(inp.value.trim()){ 
                db.ref('vox_chat').push({user:"AGENT", text:inp.value}); 
                inp.value=''; 
            } 
        }

        db.ref('vox_chat').limitToLast(15).on('value', s => {
            const box = document.getElementById('chat-box'); box.innerHTML = '';
            s.forEach(m => { 
                const d = m.val(); 
                box.innerHTML += `<div class="p-2 border-r-2 border-blue-600 bg-blue-600/5 mb-1"><span class="text-blue-500 font-bold">[!]</span> ${d.text}</div>`; 
            });
            box.scrollTop = box.scrollHeight;
        });

        function initObserver() {
            const obs = new IntersectionObserver((es) => {
                es.forEach(e => {
                    const v = e.target.querySelector('video');
                    if(e.isIntersecting) v.play().catch(()=>{});
                    else { v.pause(); v.currentTime = 0; }
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.v-seg').forEach(s => obs.observe(s));
        }
    </script>
</body>
</html>
