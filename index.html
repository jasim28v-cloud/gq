<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POLICE_OS | BLUE STAR V7</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Cairo:wght@400;700;900&display=swap');
        
        :root { 
            --p-blue: #0066ff; 
            --p-red: #ff0000; 
            --bg: #010208; 
        }

        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; }

        /* تأثير أضواء الدورية العلوية */
        .siren-lights {
            position: fixed; top: 0; width: 100%; height: 4px; z-index: 1000;
            background: linear-gradient(90deg, var(--p-blue), var(--p-red), var(--p-blue));
            background-size: 200% 100%; animation: siren-move 0.4s linear infinite;
        }
        @keyframes siren-move { from { background-position: 0% 0%; } to { background-position: 100% 0%; } }

        /* حاوية الفيديوهات */
        .scroll-engine { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .scroll-engine::-webkit-scrollbar { display: none; }
        .v-seg { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* HUD - معلومات تكتيكية */
        .hud-overlay {
            position: absolute; inset: 0; pointer-events: none; z-index: 10;
            background: radial-gradient(circle at center, transparent, rgba(0,0,0,0.4));
        }

        /* أزرار العمليات جانبية */
        .action-sidebar { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 18px; z-index: 100; }
        .tactical-btn { 
            width: 58px; height: 58px; background: rgba(0,0,0,0.6); backdrop-filter: blur(15px);
            border: 2px solid var(--p-blue); border-radius: 16px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer;
        }
        .tactical-btn i { font-size: 22px; }
        
        /* النجمة الزرقاء المطلوبة */
        .tactical-btn.blue-star i { color: var(--p-blue); text-shadow: 0 0 15px var(--p-blue); }

        /* لوحات الإدارة والدردشة */
        #admin-panel, #chat-panel {
            position: fixed; inset: 0; z-index: 2000; background: rgba(1, 2, 8, 0.98);
            display: none; flex-direction: column; padding: 40px 20px; border-top: 5px solid var(--p-blue);
        }
        .msg-line { background: rgba(0, 102, 255, 0.1); border-right: 3px solid var(--p-blue); padding: 12px; margin-bottom: 10px; border-radius: 5px; font-size: 14px; }

        /* ناف بار "حزام المعدات" */
        nav { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); 
            width: 92%; max-width: 420px; height: 75px; 
            background: rgba(0,0,0,0.9); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
            display: flex; justify-content: space-around; align-items: center; z-index: 200;
        }

        .central-upload {
            width: 70px; height: 70px; background: linear-gradient(135deg, var(--p-blue), #0033aa);
            border-radius: 50%; margin-top: -45px; display: flex; align-items: center;
            justify-content: center; border: 5px solid var(--bg); color: white; font-size: 28px;
            box-shadow: 0 5px 20px rgba(0, 102, 255, 0.4);
        }

        .toast-msg {
            position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
            background: var(--p-blue); color: white; padding: 6px 25px;
            border-radius: 50px; font-family: 'Share Tech Mono'; font-size: 12px;
            z-index: 5000; display: none;
        }
    </style>
</head>
<body>

    <div id="toast" class="toast-msg">SYSTEM_READY</div>
    <div class="siren-lights"></div>
    
    <header class="fixed top-6 left-6 right-6 z-[500] flex justify-between items-center pointer-events-none">
        <div class="bg-black/60 p-2 border-l-4 border-blue-600 pointer-events-auto rounded">
            <span class="font-['Share_Tech_Mono'] text-[10px] text-blue-400">UNIT_07 // <span id="clock">00:00</span></span>
        </div>
    </header>

    <main class="scroll-engine" id="video-stack"></main>

    <nav>
        <div class="cursor-pointer text-white/30" onclick="checkAdmin()">
            <i class="fas fa-fingerprint text-2xl"></i>
        </div>
        
        <div class="central-upload cursor-pointer" id="up-trigger">
            <i class="fas fa-camera"></i>
        </div>

        <div class="cursor-pointer text-white/30" onclick="toggleChat()">
            <i class="fas fa-handcuffs text-2xl"></i>
        </div>
    </nav>

    <div id="admin-panel">
        <div class="flex justify-between items-center mb-8">
            <h2 class="font-['Share_Tech_Mono'] text-blue-500 text-xl font-bold">CORE_ADMIN</h2>
            <i class="fas fa-times text-2xl cursor-pointer" onclick="closePanels()"></i>
        </div>
        <div id="admin-list" class="flex-1 overflow-y-auto space-y-4"></div>
    </div>

    <div id="chat-panel">
        <div class="flex justify-between items-center mb-8">
            <h2 class="font-['Share_Tech_Mono'] text-red-500 text-xl font-bold">TACTICAL_CHAT</h2>
            <i class="fas fa-times text-2xl cursor-pointer" onclick="closePanels()"></i>
        </div>
        <div id="chat-box" class="flex-1 overflow-y-auto mb-4"></div>
        <div class="flex gap-2">
            <input type="text" id="chat-input" class="flex-1 bg-white/5 border border-white/10 p-3 rounded outline-none" placeholder="Type signal...">
            <button onclick="sendChat()" class="bg-blue-600 px-6 rounded font-bold">SEND</button>
        </div>
    </div>

    <script>
        const MASTER_KEY = "1234";
        firebase.initializeApp({ databaseURL: "https://xkom-a73e4-default-rtdb.firebaseio.com/" });
        const db = firebase.database();

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2500);
        }

        // الساعة الحية
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
        }, 1000);

        // تحميل البيانات
        db.ref('vox_god_content').on('value', (snap) => {
            const container = document.getElementById('video-stack');
            const adminList = document.getElementById('admin-list');
            const data = snap.val();
            container.innerHTML = ''; adminList.innerHTML = '';
            if(!data) return;

            Object.keys(data).reverse().forEach((id) => {
                const vid = data[id];
                const section = document.createElement('section');
                section.className = 'v-seg';
                section.innerHTML = `
                    <div class="hud-overlay"></div>
                    <video id="vid-${id}" loop playsinline src="${vid.url}" onclick="this.paused?this.play():this.pause()"></video>
                    
                    <div class="action-sidebar">
                        <div class="tactical-btn blue-star" onclick="triggerLike('${id}')">
                            <i class="fas fa-star"></i>
                            <span class="text-white text-[10px] mt-1">${vid.likes || 0}</span>
                        </div>
                        <div class="tactical-btn text-white" onclick="toggleChat()">
                            <i class="fas fa-comment-dots"></i>
                        </div>
                        <div class="tactical-btn text-white" onclick="toggleMute(this, '${id}')">
                            <i class="fas fa-headset"></i>
                        </div>
                        <div class="tactical-btn text-white" onclick="navigator.share({url:window.location.href})">
                            <i class="fas fa-satellite"></i>
                        </div>
                    </div>
                `;
                container.appendChild(section);

                adminList.innerHTML += `
                    <div class="flex items-center justify-between bg-white/5 p-4 rounded-lg">
                        <video class="w-12 h-12 rounded object-cover" src="${vid.url}"></video>
                        <span class="text-[10px] font-mono text-blue-400">ID: ${id.substring(0,8)}</span>
                        <button onclick="deleteVideo('${id}')" class="text-red-500"><i class="fas fa-trash-can"></i></button>
                    </div>
                `;
            });
            initObserver();
        });

        // الرفع المباشر يفتح الفيديوهات فوراً
        const myWidget = cloudinary.createUploadWidget({ 
            cloudName: "dqzjfaqg4", uploadPreset: "vox_god", sources: ['local'], 
            clientAllowedFormats: ["video"],
            styles: { palette: { window: "#010208", windowBorder: "#0066ff", tabIcon: "#0066ff", action: "#ff0000", textLight: "#ffffff" } }
        }, (err, res) => {
            if (!err && res.event === "success") {
                db.ref('vox_god_content/').push({ url: res.info.secure_url, likes: 0, timestamp: Date.now() });
                showToast("INTEL_SAVED");
            }
        });
        document.getElementById("up-trigger").onclick = () => myWidget.open();

        // وظائف الإدارة والدردشة
        function checkAdmin() { if(prompt("SCAN ID:") === MASTER_KEY) document.getElementById('admin-panel').style.display = 'flex'; }
        function toggleChat() { document.getElementById('chat-panel').style.display = 'flex'; }
        function closePanels() { document.getElementById('admin-panel').style.display = 'none'; document.getElementById('chat-panel').style.display = 'none'; }
        
        function sendChat() {
            const inp = document.getElementById('chat-input');
            if(inp.value.trim()){ db.ref('vox_chat').push({msg: inp.value}); inp.value = ''; }
        }

        db.ref('vox_chat').limitToLast(15).on('value', s => {
            const box = document.getElementById('chat-box'); box.innerHTML = '';
            s.forEach(m => { box.innerHTML += `<div class="msg-line">${m.val().msg}</div>`; });
            box.scrollTop = box.scrollHeight;
        });

        function deleteVideo(id) { if(confirm("Confirm Delete?")) db.ref('vox_god_content/' + id).remove(); }
        function triggerLike(id) {
            db.ref('vox_god_content/' + id + '/likes').transaction(l => (l || 0) + 1);
            showToast("DATA_PROTECTED");
            if(navigator.vibrate) navigator.vibrate(50);
        }

        function toggleMute(btn, id) {
            const v = document.getElementById('vid-' + id);
            v.muted = !v.muted;
            btn.innerHTML = v.muted ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-headset"></i>';
        }

        function initObserver() {
            const obs = new IntersectionObserver((es) => {
                es.forEach(e => {
                    const v = e.target.querySelector('video');
                    if(e.isIntersecting) v.play().catch(()=>{});
                    else { v.pause(); v.currentTime = 0; }
                });
            }, { threshold: 0.7 });
            document.querySelectorAll('.v-seg').forEach(s => obs.observe(s));
        }
    </script>
</body>
</html>
