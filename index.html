<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POLICE_SURVEILLANCE | ELITE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Cairo:wght@300;700&display=swap');
        
        :root { 
            --p-blue: #0088ff; 
            --p-red: #ff3131; 
            --p-cyan: #00f2ff;
            --bg-deep: #010409;
        }

        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg-deep); color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; user-select: none; }
        
        /* خلفية سداسية تكتيكية */
        .tactical-bg { 
            position: fixed; inset: 0; z-index: -2; 
            background: 
                linear-gradient(rgba(0, 136, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 136, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
        }
        
        /* تأثير النبض الرقمي */
        .pulse-overlay {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle, transparent 20%, var(--bg-deep) 80%);
        }

        .scroll-engine { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .scroll-engine::-webkit-scrollbar { display: none; }
        
        .v-seg { 
            height: 100vh; width: 100vw; scroll-snap-align: start; 
            position: relative; overflow: hidden; 
            display: flex; align-items: center; justify-content: center;
        }

        video { 
            width: 100%; height: 100%; object-fit: cover; 
            transition: transform 0.6s cubic-bezier(0.2, 0, 0.2, 1);
        }

        /* حاوية البيانات (AR Overlay) */
        .ar-overlay {
            position: absolute; inset: 0;
            border: 20px solid transparent;
            border-image: radial-gradient(var(--p-blue), transparent) 1;
            opacity: 0.3; pointer-events: none;
        }

        /* الأزرار الجانبية المضيئة */
        .action-sidebar { 
            position: absolute; right: 20px; top: 50%; 
            transform: translateY(-50%); display: flex; 
            flex-direction: column; gap: 15px; z-index: 100; 
        }
        
        .tactical-btn {
            width: 52px; height: 52px; 
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 136, 255, 0.4);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-radius: 12px; transition: all 0.3s;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
        }

        .tactical-btn:hover {
            border-color: var(--p-cyan);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
            transform: scale(1.1);
        }

        .tactical-btn i { font-size: 20px; color: #fff; }
        .tactical-btn span { font-size: 10px; font-family: 'Share Tech Mono'; margin-top: 2px; color: var(--p-cyan); }

        /* شريط المعلومات السفلي */
        .v-info { 
            position: absolute; bottom: 120px; left: 20px; 
            z-index: 100; max-width: 70%;
        }
        
        .badge {
            background: linear-gradient(90deg, var(--p-blue), transparent);
            padding: 4px 12px; font-family: 'Share Tech Mono';
            font-size: 11px; letter-spacing: 2px; border-left: 3px solid var(--p-cyan);
            margin-bottom: 8px;
        }

        /* ناف بار عصري */
        nav { 
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); 
            width: 92%; max-width: 440px; height: 70px; 
            background: rgba(1, 4, 9, 0.85); backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
            display: flex; justify-content: space-around; align-items: center; z-index: 200;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .main-upload {
            width: 65px; height: 65px; background: var(--p-blue);
            border-radius: 50%; margin-top: -40px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 25px rgba(0, 136, 255, 0.4);
            border: 4px solid var(--bg-deep); color: white; font-size: 24px;
        }
    </style>
</head>
<body>
    <div class="tactical-bg"></div>
    <div class="pulse-overlay"></div>
    
    <header class="fixed top-6 left-6 right-6 z-[500] flex justify-between items-start pointer-events-none">
        <div class="pointer-events-auto">
            <h1 class="font-['Share_Tech_Mono'] text-white text-xl font-bold flex items-center gap-2">
                <span class="w-3 h-3 bg-red-600 rounded-full animate-pulse"></span>
                LIVE_FEED
            </h1>
            <p class="text-[10px] text-blue-400 opacity-70 tracking-tighter">SECURED_LINE // NO_LOGS</p>
        </div>
        <div class="bg-black/50 backdrop-blur-md p-2 rounded border border-white/10 font-['Share_Tech_Mono'] text-[12px] text-cyan-400" id="clock">
            00:00:00
        </div>
    </header>

    <main class="scroll-engine" id="video-stack"></main>

    <nav>
        <div class="cursor-pointer opacity-50 hover:opacity-100 transition" onclick="checkAdmin()">
            <i class="fas fa-fingerprint text-2xl"></i>
        </div>
        
        <div class="main-upload cursor-pointer" id="up-trigger">
            <i class="fas fa-plus"></i>
        </div>

        <div class="cursor-pointer opacity-50 hover:opacity-100 transition" onclick="toggleChat()">
            <i class="fas fa-satellite text-2xl"></i>
        </div>
    </nav>

    <div id="admin-panel" class="fixed inset-0 z-[1000] bg-black/fb backdrop-blur-3xl hidden flex-col p-8 border-t-4 border-blue-600">
        </div>

    <script>
        // -- المحرك البرمجي (نفس منطقك القوي مع تحسين الأداء) --
        firebase.initializeApp({ databaseURL: "https://xkom-a73e4-default-rtdb.firebaseio.com/" });
        const db = firebase.database();

        function updateClock() { 
            const now = new Date();
            document.getElementById('clock').innerText = now.getHours() + ":" + now.getMinutes() + ":" + now.getSeconds() + " [UTC]"; 
        }
        setInterval(updateClock, 1000);

        db.ref('vox_god_content').on('value', (snap) => {
            const container = document.getElementById('video-stack');
            const data = snap.val();
            container.innerHTML = '';
            if(!data) return;
            
            Object.keys(data).reverse().forEach((id) => {
                const vid = data[id];
                const section = document.createElement('section');
                section.className = 'v-seg';
                section.innerHTML = `
                    <div class="ar-overlay"></div>
                    <video id="vid-${id}" loop playsinline src="${vid.url}" onclick="this.paused?this.play():this.pause()"></video>
                    
                    <div class="v-info">
                        <div class="badge">AGENT_UNIT_${id.substring(1,5)}</div>
                        <h2 class="text-white font-bold text-lg">مراقبة حية: الموقع 0${Math.floor(Math.random()*9)}</h2>
                    </div>

                    <div class="action-sidebar">
                        <div class="tactical-btn" onclick="toggleMute(this, '${id}')">
                            <i class="fas fa-volume-up"></i>
                        </div>
                        <div class="tactical-btn" onclick="db.ref('vox_god_content/${id}/likes').transaction(l=>(l||0)+1)">
                            <i class="fas fa-shield-virus text-red-500"></i>
                            <span>${vid.likes || 0}</span>
                        </div>
                        <div class="tactical-btn" onclick="toggleChat()">
                            <i class="fas fa-comment-slash"></i>
                        </div>
                        <div class="tactical-btn" onclick="navigator.share({url:window.location.href})">
                            <i class="fas fa-location-arrow"></i>
                        </div>
                    </div>
                `;
                container.appendChild(section);
            });
            initObserver();
        });

        // تشغيل الفيديو عند التمرير
        function initObserver() {
            const obs = new IntersectionObserver((es) => {
                es.forEach(e => {
                    const v = e.target.querySelector('video');
                    if(e.isIntersecting) {
                        v.play().catch(()=>{});
                        v.style.transform = "scale(1)";
                    } else {
                        v.pause();
                        v.style.transform = "scale(1.1)";
                    }
                });
            }, { threshold: 0.7 });
            document.querySelectorAll('.v-seg').forEach(s => obs.observe(s));
        }

        const myWidget = cloudinary.createUploadWidget({ 
            cloudName: "dqzjfaqg4", 
            uploadPreset: "vox_god",
            sources: ['local', 'camera'],
            styles: { palette: { window: "#010409", windowBorder: "#0088ff", tabIcon: "#0088ff", action: "#ff3131", textLight: "#ffffff" } }
        }, (err, res) => {
            if (!err && res.event === "success") {
                db.ref('vox_god_content/').push({ url: res.info.secure_url, likes: 0, timestamp: Date.now() });
            }
        });
        document.getElementById("up-trigger").onclick = () => myWidget.open();

        function toggleChat() { /* نفس كود الـ toggle السابق */ }
        function checkAdmin() { if(prompt("SCAN ID (KEY):") === "1234") alert("تم الدخول للمنشأة"); }
    </script>
</body>
</html>
