<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POLICE_OS | ULTIMATE V6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Cairo:wght@400;700;900&display=swap');
        
        :root { 
            --p-blue: #0066ff; 
            --p-red: #ff0000; 
            --gold: #ffd700;
            --bg: #010208; 
        }

        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; }

        /* شاشة الإقلاع المبهرة */
        #boot-screen {
            position: fixed; inset: 0; z-index: 9999; background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 1.2s cubic-bezier(0.7, 0, 0.3, 1);
        }
        .shining-star { font-size: 80px; color: var(--gold); filter: drop-shadow(0 0 20px var(--gold)); animation: pulse-star 1.5s infinite; }
        @keyframes pulse-star { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.2); opacity: 0.7; } }

        /* تأثير أضواء الدورية */
        .siren-lights {
            position: fixed; top: 0; width: 100%; height: 4px; z-index: 1000;
            background: linear-gradient(90deg, var(--p-blue), var(--p-red), var(--p-blue));
            background-size: 200% 100%; animation: siren-move 0.4s linear infinite;
        }
        @keyframes siren-move { from { background-position: 0% 0%; } to { background-position: 100% 0%; } }

        /* حاوية الفيديوهات */
        .scroll-engine { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .scroll-engine::-webkit-scrollbar { display: none; }
        .v-seg { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* HUD - معلومات تكتيكية */
        .hud-overlay {
            position: absolute; inset: 0; pointer-events: none; z-index: 10;
            border: 1px solid rgba(0, 102, 255, 0.1);
            background: radial-gradient(circle at center, transparent, rgba(0,0,0,0.4));
        }
        .hud-top { position: absolute; top: 80px; left: 20px; font-family: 'Share Tech Mono'; color: var(--p-blue); font-size: 10px; line-height: 1.5; }

        /* أزرار العمليات (هيكل الزي) */
        .action-sidebar { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 20px; z-index: 100; }
        .tactical-btn { 
            width: 60px; height: 60px; background: rgba(0,0,0,0.6); backdrop-filter: blur(15px);
            border: 2px solid var(--p-blue); border-radius: 18px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer;
        }
        .tactical-btn:active { transform: scale(0.85) rotate(5deg); }
        .tactical-btn i { font-size: 24px; }
        .tactical-btn.gold i { color: var(--gold); text-shadow: 0 0 10px var(--gold); }
        .tactical-btn.blue i { color: var(--p-blue); text-shadow: 0 0 10px var(--p-blue); }

        /* لوحة التحكم الاحترافية */
        #admin-panel {
            position: fixed; inset: 0; z-index: 2000; background: rgba(1, 2, 8, 0.98);
            display: none; flex-direction: column; padding: 40px 20px; border-top: 5px solid var(--p-blue);
        }
        .admin-item { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; margin-bottom: 15px; display: flex; align-items: center; gap: 15px; border-right: 4px solid var(--p-red); }

        /* ناف بار "حزام المعدات" */
        nav { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); 
            width: 90%; max-width: 420px; height: 80px; 
            background: rgba(0,0,0,0.85); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 25px;
            display: flex; justify-content: space-around; align-items: center; z-index: 200;
            box-shadow: 0 20px 50px rgba(0,0,0,1);
        }

        .central-upload {
            width: 75px; height: 75px; background: linear-gradient(135deg, var(--p-blue), #0033aa);
            border-radius: 50%; margin-top: -50px; display: flex; align-items: center;
            justify-content: center; box-shadow: 0 10px 30px rgba(0, 102, 255, 0.5);
            border: 6px solid var(--bg); color: white; font-size: 30px;
        }

        .toast-msg {
            position: fixed; top: 100px; left: 50%; transform: translateX(-50%);
            background: var(--p-blue); color: white; padding: 8px 30px;
            border-radius: 50px; font-family: 'Share Tech Mono'; font-size: 12px;
            z-index: 5000; display: none; box-shadow: 0 0 20px var(--p-blue);
        }
    </style>
</head>
<body>

    <div id="boot-screen">
        <i class="fas fa-star shining-star"></i>
        <p class="mt-10 font-['Share_Tech_Mono'] text-white tracking-[10px] animate-pulse">BOOTING POLICE_OS</p>
    </div>

    <div id="toast" class="toast-msg">SYSTEM_UPDATE</div>
    <div class="siren-lights"></div>
    
    <header class="fixed top-6 left-6 right-6 z-[500] flex justify-between items-center pointer-events-none">
        <div class="bg-black/60 p-3 border-l-4 border-blue-600 pointer-events-auto rounded-lg">
            <span class="font-['Share_Tech_Mono'] text-xs text-blue-400">OFFICER: <span class="text-white">COMMANDER_V6</span></span>
        </div>
        <div class="bg-red-600 px-3 py-1 rounded text-[10px] font-black tracking-widest animate-pulse pointer-events-auto">RECORDING</div>
    </header>

    <main class="scroll-engine" id="video-stack"></main>

    <nav>
        <div class="cursor-pointer text-white/40 hover:text-blue-500 transition" onclick="checkAdmin()">
            <i class="fas fa-id-card-clip text-2xl"></i>
        </div>
        
        <div class="central-upload cursor-pointer" id="up-trigger">
            <i class="fas fa-camera-retro"></i>
        </div>

        <div class="cursor-pointer text-white/40 hover:text-red-500 transition" onclick="toggleChat()">
            <i class="fas fa-handcuffs text-2xl"></i>
        </div>
    </nav>

    <div id="admin-panel">
        <div class="flex justify-between items-center mb-10 pb-5 border-b border-white/10">
            <h2 class="font-['Share_Tech_Mono'] text-blue-500 text-2xl font-black">CORE_ADMIN</h2>
            <i class="fas fa-times text-2xl cursor-pointer" onclick="closeAdmin()"></i>
        </div>
        <div id="admin-list" class="flex-1 overflow-y-auto"></div>
    </div>

    <script>
        const MASTER_KEY = "1234";
        firebase.initializeApp({ databaseURL: "https://xkom-a73e4-default-rtdb.firebaseio.com/" });
        const db = firebase.database();

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('boot-screen').style.transform = 'translateY(-100%)';
                showToast("WELCOME COMMANDER");
            }, 2500);
        });

        // محرك البيانات
        db.ref('vox_god_content').on('value', (snap) => {
            const container = document.getElementById('video-stack');
            const adminList = document.getElementById('admin-list');
            const data = snap.val();
            container.innerHTML = ''; adminList.innerHTML = '';
            if(!data) return;

            Object.keys(data).reverse().forEach((id) => {
                const vid = data[id];
                const section = document.createElement('section');
                section.className = 'v-seg';
                section.innerHTML = `
                    <div class="hud-overlay"></div>
                    <div class="hud-top">
                        [SCANNING_AREA...]<br>
                        LAT: ${ (Math.random()*100).toFixed(4) }<br>
                        LON: ${ (Math.random()*100).toFixed(4) }<br>
                        SIGNAL: ENCRYPTED
                    </div>
                    <video id="vid-${id}" loop playsinline src="${vid.url}" onclick="this.paused?this.play():this.pause()"></video>
                    
                    <div class="action-sidebar">
                        <div class="tactical-btn blue" onclick="toggleMute(this, '${id}')">
                            <i class="fas fa-headset"></i>
                        </div>
                        <div class="tactical-btn gold" onclick="triggerLike('${id}')">
                            <i class="fas fa-star"></i>
                            <span class="text-white text-[10px] mt-1">${vid.likes || 0}</span>
                        </div>
                        <div class="tactical-btn blue" onclick="navigator.share({url:window.location.href})">
                            <i class="fas fa-satellite"></i>
                        </div>
                    </div>

                    <div class="absolute bottom-32 right-6 left-20 border-r-4 border-red-600 pr-5 text-right">
                        <p class="font-['Share_Tech_Mono'] text-red-500 text-[10px]">UNIT_LOG_#${id.substring(1,6)}</p>
                        <h3 class="text-white font-black text-xl">ملف الأدلة الرقمي</h3>
                    </div>
                `;
                container.appendChild(section);

                adminList.innerHTML += `
                    <div class="admin-item">
                        <video class="w-16 h-16 rounded-lg object-cover" src="${vid.url}"></video>
                        <div class="flex-1">
                            <p class="text-[10px] font-mono text-blue-400">${id}</p>
                            <p class="text-xs">تم الرفع بواسطة وحدة التحكم</p>
                        </div>
                        <button onclick="deleteVideo('${id}')" class="text-red-500 bg-red-500/10 p-4 rounded-full"><i class="fas fa-trash-can"></i></button>
                    </div>
                `;
            });
            initObserver();
        });

        // رفع مباشر يفتح الاستوديو فوراً
        const myWidget = cloudinary.createUploadWidget({ 
            cloudName: "dqzjfaqg4", uploadPreset: "vox_god", 
            sources: ['local', 'camera'], 
            styles: { palette: { window: "#010208", windowBorder: "#0066ff", tabIcon: "#0066ff", action: "#ff0000", textLight: "#ffffff" } }
        }, (err, res) => {
            if (!err && res.event === "success") {
                db.ref('vox_god_content/').push({ url: res.info.secure_url, likes: 0, timestamp: Date.now() });
                showToast("DATA_UPLOAD_SUCCESS");
            }
        });
        document.getElementById("up-trigger").onclick = () => myWidget.open();

        function checkAdmin() { if(prompt("ACCESS CODE REQUIRED:") === MASTER_KEY) document.getElementById('admin-panel').style.display = 'flex'; }
        function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
        function deleteVideo(id) { if(confirm("تأكيد إتلاف الدليل الرقمي؟")) db.ref('vox_god_content/' + id).remove(); }
        
        function triggerLike(id) {
            db.ref('vox_god_content/' + id + '/likes').transaction(l => (l || 0) + 1);
            showToast("DATA_BACKED_UP");
            if(navigator.vibrate) navigator.vibrate([50, 30, 50]);
        }

        function toggleMute(btn, id) {
            const v = document.getElementById('vid-' + id);
            v.muted = !v.muted;
            btn.innerHTML = v.muted ? '<i class="fas fa-volume-xmark"></i>' : '<i class="fas fa-headset"></i>';
        }

        function initObserver() {
            const obs = new IntersectionObserver((es) => {
                es.forEach(e => {
                    const v = e.target.querySelector('video');
                    if(e.isIntersecting) v.play().catch(()=>{});
                    else { v.pause(); v.currentTime = 0; }
                });
            }, { threshold: 0.7 });
            document.querySelectorAll('.v-seg').forEach(s => obs.observe(s));
        }
    </script>
</body>
</html>
