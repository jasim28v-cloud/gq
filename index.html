<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POLICE_OS | IONIC V3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Cairo:wght@400;700&display=swap');
        
        :root { 
            --p-blue: #00ccff; 
            --p-red: #ff0033; 
            --bg-dark: #010208; 
            --glass: rgba(255, 255, 255, 0.03);
        }

        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg-dark); color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; user-select: none; }
        
        /* تأثير الخلفية الأيونية */
        .ionic-bg { 
            position: fixed; inset: 0; z-index: -2; 
            background: 
                radial-gradient(circle at 10% 10%, rgba(0, 204, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 90% 90%, rgba(255, 0, 51, 0.1) 0%, transparent 50%);
        }

        /* شاشة التحميل المتطورة */
        #boot-screen {
            position: fixed; inset: 0; z-index: 9999;
            background: var(--bg-dark); display: flex; flex-direction: column;
            align-items: center; justify-content: center; transition: 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .loader-hex {
            width: 80px; height: 80px; background: transparent;
            border: 3px solid var(--p-blue); clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            animation: pulse-hex 1.5s infinite;
        }
        @keyframes pulse-hex { 0%, 100% { transform: scale(1); border-color: var(--p-blue); } 50% { transform: scale(1.1); border-color: var(--p-red); } }

        /* حاوية الفيديو */
        .scroll-engine { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .scroll-engine::-webkit-scrollbar { display: none; }
        .v-seg { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* تأثير المسح الضوئي */
        .scanner-line {
            position: absolute; top: 0; left: 0; width: 100%; height: 40px;
            background: linear-gradient(to bottom, transparent, rgba(0, 204, 255, 0.15), transparent);
            animation: scan-move 4s linear infinite; pointer-events: none; z-index: 5;
        }
        @keyframes scan-move { 0% { top: -100px; } 100% { top: 110%; } }

        /* أزرار العمليات الأيونية */
        .action-sidebar { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 18px; z-index: 100; }
        .action-btn { 
            width: 58px; height: 58px; background: var(--glass);
            backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            border-radius: 50%; transition: 0.3s; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .action-btn i { font-size: 22px; transition: 0.3s; }
        .btn-blue:hover { border-color: var(--p-blue); box-shadow: 0 0 15px var(--p-blue); }
        .btn-blue i { color: var(--p-blue); }
        .btn-red:hover { border-color: var(--p-red); box-shadow: 0 0 15px var(--p-red); }
        .btn-red i { color: var(--p-red); }

        /* شريط المعلومات السفلي */
        .v-details { position: absolute; bottom: 130px; left: 20px; right: 80px; z-index: 100; }
        .badge-tactical {
            background: rgba(0,0,0,0.6); border-right: 4px solid var(--p-blue);
            padding: 4px 12px; font-family: 'Share Tech Mono'; font-size: 11px;
            color: var(--p-blue); display: inline-block; margin-bottom: 8px;
        }

        /* ناف بار "زجاجي أيوني" */
        nav { 
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); 
            width: 90%; max-width: 420px; height: 75px; 
            background: rgba(1, 2, 8, 0.8); backdrop-filter: blur(25px);
            border: 1px solid rgba(0, 204, 255, 0.2); border-radius: 20px;
            display: flex; justify-content: space-around; align-items: center; z-index: 200;
        }

        .upload-main {
            width: 65px; height: 65px; background: linear-gradient(135deg, var(--p-blue), var(--p-red));
            border-radius: 50%; margin-top: -45px; display: flex; align-items: center;
            justify-content: center; box-shadow: 0 8px 25px rgba(0, 204, 255, 0.4);
            border: 5px solid var(--bg-dark); color: white; font-size: 26px;
        }
        
        /* التنبيهات */
        .toast-system {
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 204, 255, 0.1); backdrop-filter: blur(15px);
            border: 1px solid var(--p-blue); padding: 10px 30px; border-radius: 50px;
            font-family: 'Share Tech Mono'; font-size: 13px; z-index: 9999;
            display: none; animation: popUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popUp { from { transform: translate(-50%, -100px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
    </style>
</head>
<body>

    <div id="boot-screen">
        <div class="loader-hex"></div>
        <p class="mt-6 font-['Share_Tech_Mono'] text-white tracking-[5px] animate-pulse">IONIC_OS BOOTING...</p>
    </div>

    <div id="toast" class="toast-system">SYSTEM_READY</div>

    <div class="ionic-bg"></div>
    
    <header class="fixed top-6 left-6 right-6 z-[500] flex justify-between items-center pointer-events-none">
        <div class="bg-black/40 backdrop-blur-md border-r-4 border-blue-500 px-4 py-2 pointer-events-auto">
            <span class="font-['Share_Tech_Mono'] text-sm text-blue-400">STATUS: <span class="text-white">ENCRYPTED</span></span>
        </div>
        <div class="font-['Share_Tech_Mono'] text-sm text-red-500" id="clock">00:00:00</div>
    </header>

    <main class="scroll-engine" id="video-stack"></main>

    <nav>
        <div class="cursor-pointer text-blue-400/50 hover:text-blue-400" onclick="checkAdmin()">
            <i class="fas fa-fingerprint text-2xl"></i>
        </div>
        
        <div class="upload-main cursor-pointer" id="up-trigger">
            <i class="fas fa-plus"></i>
        </div>

        <div class="cursor-pointer text-red-400/50 hover:text-red-400" onclick="toggleChat()">
            <i class="fas fa-broadcast-tower text-2xl"></i>
        </div>
    </nav>

    <div id="chat-ov" class="fixed inset-0 z-[1000] bg-black/90 backdrop-blur-3xl hidden flex-col p-8 border-t-4 border-red-600">
        </div>

    <script>
        const MASTER_KEY = "1234";
        firebase.initializeApp({ databaseURL: "https://xkom-a73e4-default-rtdb.firebaseio.com/" });
        const db = firebase.database();

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('boot-screen').style.transform = 'translateY(-100%)';
                showToast("SIGNAL ESTABLISHED");
            }, 2500);
        });

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB');
        }, 1000);

        db.ref('vox_god_content').on('value', (snap) => {
            const container = document.getElementById('video-stack');
            const data = snap.val();
            container.innerHTML = '';
            if(!data) return;

            Object.keys(data).reverse().forEach((id) => {
                const vid = data[id];
                const section = document.createElement('section');
                section.className = 'v-seg';
                section.innerHTML = `
                    <div class="scanner-line"></div>
                    <video id="vid-${id}" loop playsinline src="${vid.url}" onclick="this.paused?this.play():this.pause()"></video>
                    
                    <div class="v-details">
                        <div class="badge-tactical">INTEL_FEED_SECURE</div>
                        <h2 class="text-white font-bold text-lg tracking-wide">المنطقة الأمنية 0${id.substring(1,2)}</h2>
                        <p class="text-xs text-white/50 font-mono mt-1">LAT: ${Math.random().toFixed(4)} / LONG: ${Math.random().toFixed(4)}</p>
                    </div>

                    <div class="action-sidebar">
                        <div class="action-btn btn-blue" onclick="toggleMute(this, '${id}')">
                            <i class="fas fa-volume-high"></i>
                        </div>
                        <div class="action-btn btn-red" onclick="triggerLike('${id}')">
                            <i class="fas fa-shield-halved"></i>
                            <span class="text-white text-[10px] font-bold mt-1">${vid.likes || 0}</span>
                        </div>
                        <div class="action-btn btn-blue" onclick="toggleChat()">
                            <i class="fas fa-comment-medical"></i>
                        </div>
                        <div class="action-btn btn-blue" onclick="navigator.share({url:window.location.href})">
                            <i class="fas fa-satellite"></i>
                        </div>
                    </div>
                `;
                container.appendChild(section);
            });
            initObserver();
        });

        function triggerLike(id) {
            db.ref('vox_god_content/' + id + '/likes').transaction(l => (l || 0) + 1);
            showToast("DATA_PROTECTED");
            if(navigator.vibrate) navigator.vibrate([50, 30, 50]);
        }

        // تشغيل الفيديو عند التمرير بشكل سلس
        function initObserver() {
            const obs = new IntersectionObserver((es) => {
                es.forEach(e => {
                    const v = e.target.querySelector('video');
                    if(e.isIntersecting) v.play().catch(()=>{});
                    else { v.pause(); v.currentTime = 0; }
                });
            }, { threshold: 0.7 });
            document.querySelectorAll('.v-seg').forEach(s => obs.observe(s));
        }

        const myWidget = cloudinary.createUploadWidget({ 
            cloudName: "dqzjfaqg4", uploadPreset: "vox_god", 
            styles: { palette: { window: "#010208", windowBorder: "#00ccff", tabIcon: "#00ccff", action: "#ff0033", textLight: "#ffffff" } }
        }, (err, res) => {
            if (!err && res.event === "success") {
                db.ref('vox_god_content/').push({ url: res.info.secure_url, likes: 0, timestamp: Date.now() });
            }
        });
        document.getElementById("up-trigger").onclick = () => myWidget.open();

        function toggleChat() { /* كود التبديل الخاص بك */ }
        function checkAdmin() { if(prompt("SCAN ID KEY:") === MASTER_KEY) showToast("ADMIN_ACCESS_GRANTED"); }
    </script>
</body>
</html>
